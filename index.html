<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio - Anson</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
          background: url("ii.jpg") no-repeat center center fixed;
background-size: cover;
        }

        .card {
            background: #1c2b36;
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #e86629;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
            font-size: 24px;
        }

        h3 {
            margin: 5px 0 15px;
            color:red;
            font-weight: normal;
        }

        p {
            font-size: 19px;
            line-height: 1.8;
            margin-bottom: 27px;
            color: #ddd;
        }

        h4 {
            margin-bottom: 18px;
            font-weight: normal;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            text-decoration: none;
            background: #e40c0c;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0097a7;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="EE.jpg" alt="Profile Photo" class="profile-img">

        <h1>Hi, I'm VIKRAM</h1>
        <h3>FULLSTACK DEVELOPER</h3>

        <p>
            Welcome to my simple portfolio! I use this page to demonstrate 
            how basic HTML and CSS work together to create a clean profile design.
        </p>

        <h4>Connect with me:</h4>

        <div class="buttons">
            <a href="#" class="btn">LinkedIn</a>
            <a href="https://github.com/vikramempire/portfolio/tree/main/portfolio" class="btn">GitHub</a>
            <a href="#" class="btn">Projects</a>
        </div>
    </div>

</body>
</html>
