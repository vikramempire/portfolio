<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vikram Portfolio</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

    <!-- AOS Animation -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css"/>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>



<div class="overlay"></div>

<!-- NAVBAR -->
<nav>
    <div class="nav-container">

        <div class="logo" data-aos="zoom-in">
            <span>WELCOME</span>
        </div>

        <div class="links">
            <div class="link"><a href="#">Home</a></div>
            <div class="link"><a href="#">About</a></div>
            <div class="link"><a href="#">Skills</a></div>
            <div class="link"><a href="#">Projects</a></div>
            <div class="link"><a href="#">Blogs</a></div>
            <div class="link contact-btn"><a href="#">Contact</a></div>
        </div>

        <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
    </div>

    <!-- MOBILE MENU -->
    <div class="dropdown">
        <div class="links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Skills</a>
            <a href="#">Projects</a>
            <a href="#">Blogs</a>
            <a href="#">Contact</a>

            <i class="fa-solid fa-xmark cancel" onclick="cancel()"></i>
        </div>
    </div>
</nav>

<!-- HERO SECTION -->
<section>
    <div class="main-container">

        <div class="image" data-aos="zoom-in-right">
            <img src="main.png" alt="profile">
        </div>

        <div class="content">

            <h3 data-aos="fade-right">Code. Create. Conquer.</h3>

            <h1 data-aos="fade-left">Hi, I'm <span> VIKRAM</span></h1>

            <div class="typewriter">
                I'm <span id="typing">
                Final-year B.Tech student passionate 
                about web development.
                Currently learning Full Stack Development 
                and building real-world projects using modern technologies.
            </span>
            

            

            <div class="social-links">
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-facebook"></i></a>
            </div>

            <div class="btn">
                <button>Download CV</button>
            </div>

        </div>
    </div>
</section>

<!-- SCRIPTS -->
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
AOS.init({ offset: 0 });

// Typewriter
const words = [
                "Final-year B.Tech student passionate about web development\n",
            
                "Currently learning Full Stack Development and building real-world projects using modern technologies\n"
            ];
let i = 0;
let j = 0;
let current = "";
let isDeleting = false;
const typing = document.getElementById("typing");

function type() {
    current = words[i];

    if (isDeleting) {
        typing.textContent = current.substring(0, j--);
        if (j < 0) {
            isDeleting = false;
            i = (i + 1) % words.length;
        }
    } else {
        typing.textContent = current.substring(0, j++);
        if (j > current.length) {
            isDeleting = true;
            setTimeout(type, 1000);
            return;
        }
    }

    setTimeout(type, isDeleting ? 60 : 120);
}

type();

// Mobile menu
function hamburg(){
    document.querySelector(".dropdown").style.transform = "translateY(0)";
}

function cancel(){
    document.querySelector(".dropdown").style.transform = "translateY(-500px)";
}
</script>

</body>
</html>
